# Alembic configuration.
#
# The database URL is intentionally NOT set here; it is resolved at runtime in
# migrations/env.py from application settings (Settings.sqlalchemy_dsn), so the
# same DSN/.env is used by both the app and migrations.

[alembic]
# Path to migration scripts (relative to this file).
script_location = migrations

# Template used to generate migration file names; prefixes a zero-padded,
# incrementing rev id + slug, e.g. 0001_create_integration_logs.py
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in generated migrations.
timezone = UTC

# Max length of the slug portion of a filename.
truncate_slug_length = 40

# Detect column type changes during autogenerate.
# (compare_type is enabled in env.py.)

prepend_sys_path = .

[post_write_hooks]
# Optional: run a formatter on generated migrations. Disabled by default.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
